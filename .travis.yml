# Set TEST_BUILDS=1 to run library_builders tests

language: generic

cache:
  directories:
   - $HOME/.ccache

env:
    global:
        # Always set Python version
        - MB_PYTHON_VERSION=3.7

matrix:
  include:
    - os: osx
      osx_image: xcode9.4
      env:
        - MB_PYTHON_VERSION=3.5
        - TEST_BUILDS=1
    - os: osx
      osx_image: xcode9.3
      env:
        - MB_PYTHON_VERSION=3.5
        - TEST_BUILDS=1

script:
  - export ENV_VARS_PATH="tests/env_vars.sh"
  - source tests/test_multibuild.sh
